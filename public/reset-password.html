<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="/favicon.svg" type="image/svg+xml"><title>Reset Password | Sparkles Cleaning Cambridge</title><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/cleaner.css"><link rel="stylesheet" href="/payments.css"></head>
<body><div class="topbar"></div><header><nav class="nav"><a class="brand" href="/"><span class="brand-mark">✦</span><span>Sparkles Cleaning Cambridge<small>Password Reset</small></span></a></nav></header>
<main class="payment-page"><section class="payment-card auth-card" id="resetCard"><h1>Reset password</h1><p id="resetIntro">Enter your email and account type. We’ll send a secure reset link.</p><div id="authAlert" class="alert"></div><form id="requestForm"><div class="field"><label>Account type</label><select name="role" id="role"><option value="customer">Customer</option><option value="cleaner">Cleaner</option><option value="admin">Admin</option></select></div><div class="field"><label>Email</label><input name="email" type="email" autocomplete="email" required></div><button class="submit" type="submit">Send reset link</button></form><form id="confirmForm" hidden><div class="field"><label>New password</label><input name="password" type="password" minlength="8" autocomplete="new-password" required></div><button class="submit" type="submit">Save new password</button></form></section></main>
<script src="/reset-password.js"></script></body></html>
