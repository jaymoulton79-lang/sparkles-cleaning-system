<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Sparkles Cleaner Portal | Sparkles Cleaning Cambridge</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/sparkles-design-system.css">
  <link rel="stylesheet" href="/cleaner.css">
  <link rel="stylesheet" href="/admin-bookings.css">
</head>
<body class="sparkles-ds cleaner-portal-body">
  <div class="topbar"></div>
  <header class="sp-nav">
    <nav class="sp-nav-inner">
      <a class="sp-brand" href="/cleaner/dashboard">
        <img class="sp-logo-img" src="/assets/sparkles-premium-logo.jpg" alt="Sparkles Cleaning Cambridge logo">
        <span class="sp-wordmark">Sparkles Cleaning Cambridge<small>Cleaner App</small></span>
      </a>
      <button class="sp-button sp-button-ghost" id="logout">Log out</button>
    </nav>
  </header>

  <main class="dash cleaner-portal-main">
    <section class="cleaner-portal-hero">
      <div>
        <p class="eyebrow">Sparkles Cleaner Portal</p>
        <h1>Your jobs, beautifully organised.</h1>
        <p>Accept jobs, get directions, update progress and keep Sparkles in the loop. Smiles Come Standard.</p>
      </div>
      <div class="cleaner-hero-badge">
        <span>Today</span>
        <strong id="todayJobCount">0</strong>
        <small>active jobs</small>
      </div>
    </section>

    <section class="cleaner-summary-grid" id="cleanerSummary" aria-label="Cleaner job summary">
      <div class="summary-pill"><span>Awaiting response</span><strong>0</strong></div>
      <div class="summary-pill"><span>Today</span><strong>0</strong></div>
      <div class="summary-pill"><span>Upcoming</span><strong>0</strong></div>
      <div class="summary-pill"><span>Completed</span><strong>0</strong></div>
    </section>

    <section class="table-card cleaner-jobs-shell" id="jobs">
      <div class="sp-loader"><div class="sp-spinner"></div><p>Loading your Sparkles jobs...</p></div>
    </section>
  </main>

  <script src="/cleaner-dashboard.js?v=20260714-role-login-payouts"></script>
</body>
</html>
